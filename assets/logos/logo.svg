<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="#e94560" stroke-width="2"/>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#0f3460" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Play button triangle -->
  <polygon points="170,140 170,260 270,200" fill="url(#play)" filter="url(#shadow)"/>
  <!-- Film reel dots -->
  <circle cx="200" cy="80" r="6" fill="#e94560" opacity="0.7"/>
  <circle cx="200" cy="320" r="6" fill="#e94560" opacity="0.7"/>
  <circle cx="80" cy="200" r="6" fill="#e94560" opacity="0.7"/>
  <circle cx="320" cy="200" r="6" fill="#e94560" opacity="0.7"/>
  <!-- Small decorative dots -->
  <circle cx="140" cy="110" r="3" fill="#ff6b6b" opacity="0.4"/>
  <circle cx="260" cy="110" r="3" fill="#ff6b6b" opacity="0.4"/>
  <circle cx="140" cy="290" r="3" fill="#ff6b6b" opacity="0.4"/>
  <circle cx="260" cy="290" r="3" fill="#ff6b6b" opacity="0.4"/>
  <!-- Bottom text -->
  <text x="200" y="370" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="14" letter-spacing="3">VIDEO GENERATOR</text>
</svg>
