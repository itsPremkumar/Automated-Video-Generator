<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1280" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1280" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1280" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1280" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="640" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="640" cy="320" r="280" fill="none" stroke="#e94560" stroke-width="1" opacity="0.1"/>
  <circle cx="640" cy="320" r="200" fill="none" stroke="#e94560" stroke-width="1" opacity="0.15"/>
  <circle cx="640" cy="320" r="120" fill="none" stroke="#e94560" stroke-width="1" opacity="0.2"/>
  <!-- Accent line -->
  <rect x="320" y="200" width="640" height="4" rx="2" fill="url(#line)"/>
  <!-- Main title -->
  <text x="640" y="280" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="64" font-weight="bold" letter-spacing="2">Automated Video Generator</text>
  <!-- Subtitle -->
  <text x="640" y="340" text-anchor="middle" fill="#8899aa" font-family="Arial, sans-serif" font-size="28" letter-spacing="1">Free &amp; Open-Source AI Text-to-Video Pipeline</text>
  <!-- Feature tags -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#667788">
    <text x="640" y="390" text-anchor="middle">Remotion · Edge-TTS · Stock Media · MCP Server · Self-Hosted</text>
  </g>
  <!-- Bottom bar -->
  <rect x="320" y="460" width="640" height="2" rx="1" fill="#e94560" opacity="0.3"/>
  <!-- GitHub stats -->
  <g font-family="Arial, sans-serif" font-size="16" fill="#e94560">
    <text x="640" y="500" text-anchor="middle">MIT Licensed · No API Key Required · 400+ Voices</text>
  </g>
</svg>
