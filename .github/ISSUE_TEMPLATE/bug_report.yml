name: Bug report
description: Report a problem with the video generator
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: e.g. 20.x
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any error output (redact personal paths).
      render: shell
