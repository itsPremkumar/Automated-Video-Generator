name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint & Format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run lint
            - run: npm run format:check

    typecheck:
        name: TypeScript Check
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [18, 20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: npm
            - run: npm ci
            - run: npm run typecheck

    test:
        name: Unit Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run test:unit

    docker:
        name: Docker Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Build Docker image
              run: docker build -t automated-video-generator .

    security:
        name: Dependency Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            # Fail the build if any high/critical vulnerability is found, so the
            # "0 vulnerabilities" guarantee cannot silently regress.
            - run: npm audit --audit-level=high

    render-e2e:
        name: Render E2E (real video)
        # Heavy Chromium+ffmpeg render. Kept as informational coverage only —
        # it is flaky in CI and must NOT block merges. Mark non-blocking.
        continue-on-error: true
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - name: Install ffmpeg (required for concatenation)
              run: sudo apt-get update && sudo apt-get install -y ffmpeg
            - run: npm ci
              # RUN_RENDER_E2E=1 enables the real Chromium+ffmpeg render in the
              # e2e test; without it the test skips the heavy render safely.
              env:
                  RUN_RENDER_E2E: '1'
            - run: npm run test:render
              env:
                  RUN_RENDER_E2E: '1'
