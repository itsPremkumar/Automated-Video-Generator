name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + Unit/Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run test suite
        # Network-dependent image-provider tests (Wikimedia/MetMuseum) skip
        # automatically when their host is unreachable (see TESTING.md §6), so
        # CI does not require external network access or API keys.
        run: npm run test:unit
