version: "3.8"

services:
  video-generator:
    build: .
    container_name: automated-video-generator
    ports:
      - "3001:3001"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./public:/app/public
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => {process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
