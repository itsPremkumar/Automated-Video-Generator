# Automated Video Generator — docker compose
#
# Avoids "version / system" errors:
#   - platform: linux/amd64 pins the runtime arch so ffmpeg-static / native
#     addons fetch the correct x64 binary (prevents the classic
#     "Error: /lib/x86_64-linux-gnu/... invalid ELF" on Apple Silicon / ARM).
#   - healthcheck hits the real /api/health route (not the stale /health).
#   - depends_on uses the container HEALTHCHECK, not just "started".
#
# Usage:
#   docker compose up --build
#   app:  http://localhost:3001   health: http://localhost:3001/api/health

services:
  video-generator:
    build:
      context: .
      dockerfile: Dockerfile
    image: automated-video-generator:latest
    container_name: automated-video-generator
    platform: linux/amd64
    ports:
      - "3001:3001"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./public:/app/public
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VIDEO_ORIENTATION=landscape
      - VIDEO_VOICE=en-US-GuyNeural
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # OPTIONAL: Voicebox GPU/CPU voice-clone backend (separate repo).
